  <body>
    <script>
      (function(){var t=localStorage.getItem("theme");if(!t)t=window.matchMedia("(prefers-color-scheme:light)").matches?"light":"dark";var d=document.documentElement;d.classList.add(t);d.style.colorScheme=t;})();
    </script>
    <div id="app"></div>

  </body>
